<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长街宴环形礼仪图</title>
  <style>
    @import url('css/embed-theme.css');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      padding: 12px 10px 20px;
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
    }

    .frame {
      max-width: 620px;
      margin: 0 auto;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .chart {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .chart__img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0;
      box-shadow: none;
      /* 让图内白底与站点宣纸色 #f5efe6 融合 */
      mix-blend-mode: multiply;
    }

    .chart__svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .zone {
      cursor: pointer;
    }

    .zone-hit {
      fill: transparent;
      stroke: transparent;
      stroke-width: 2;
      transition: fill 0.3s ease, stroke 0.3s ease;
    }

    .zone.is-active .zone-hit {
      fill: rgba(47, 143, 90, 0.12);
      stroke: rgba(47, 143, 90, 0.65);
    }

    .zone.is-dim .zone-hit {
      fill: rgba(255, 255, 255, 0.35);
    }

    .tooltip {
      position: fixed;
      z-index: 99;
      max-width: 260px;
      padding: 12px 14px;
      background: linear-gradient(160deg, #fffaf3, #f3e2c8);
      border-radius: 10px;
      border: 1px solid rgba(139, 26, 26, 0.18);
      box-shadow: 0 12px 32px rgba(61, 43, 31, 0.14);
      font-size: 13px;
      line-height: 1.55;
      color: #3d2b1f;
      text-align: left;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: 0.22s ease;
    }

    .tooltip.is-visible {
      opacity: 1;
      transform: none;
    }

    .tooltip strong {
      display: block;
      margin-bottom: 4px;
      color: #8b1a1a;
      font-size: 14px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="chart" id="chart">
      <img
        class="chart__img"
        src="image/美食/环形礼仪图/长街宴礼仪流程·时空双轴图.png"
        alt="尊老爱幼 · 长幼有序 — 长街宴环形礼仪图"
        width="570"
        height="393"
      />
      <svg class="chart__svg" viewBox="0 0 570 393" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="zone" data-tip="迎宾礼|村口迎客，互道祝福">
          <circle class="zone-hit" cx="285" cy="52" r="42"/>
        </g>
        <g class="zone" data-tip="分福肉|重点标注：长辈优先，福泽绵长">
          <circle class="zone-hit" cx="468" cy="158" r="42"/>
        </g>
        <g class="zone" data-tip="敬酒礼|晚辈向长辈敬酒，表达感恩">
          <circle class="zone-hit" cx="408" cy="318" r="42"/>
        </g>
        <g class="zone" data-tip="布菜礼|长者优先享用，共享佳肴">
          <circle class="zone-hit" cx="162" cy="318" r="42"/>
        </g>
        <g class="zone" data-tip="散席礼|互赠伴手礼，依依惜别">
          <circle class="zone-hit" cx="102" cy="158" r="42"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="tooltip" id="tooltip" role="tooltip" hidden></div>

  <script>
    (function () {
      var zones = Array.prototype.slice.call(document.querySelectorAll('.zone'));
      var tooltip = document.getElementById('tooltip');

      function showTip(html, x, y) {
        tooltip.innerHTML = html;
        tooltip.hidden = false;
        tooltip.classList.add('is-visible');
        var rect = tooltip.getBoundingClientRect();
        tooltip.style.left = Math.min(x + 12, window.innerWidth - rect.width - 10) + 'px';
        tooltip.style.top = Math.max(y - rect.height - 12, 8) + 'px';
      }

      function hideTip() {
        tooltip.classList.remove('is-visible');
        tooltip.hidden = true;
        zones.forEach(function (z) {
          z.classList.remove('is-active', 'is-dim');
        });
      }

      zones.forEach(function (zone) {
        zone.addEventListener('mouseenter', function (e) {
          zones.forEach(function (z) {
            z.classList.toggle('is-dim', z !== zone);
            z.classList.toggle('is-active', z === zone);
          });
          var parts = (zone.dataset.tip || '').split('|');
          showTip('<strong>' + parts[0] + '</strong>' + (parts[1] || ''), e.clientX, e.clientY);
        });
        zone.addEventListener('mousemove', function (e) {
          if (!tooltip.hidden) showTip(tooltip.innerHTML, e.clientX, e.clientY);
        });
        zone.addEventListener('mouseleave', hideTip);
      });
    })();
  </script>
  <script src="js/embed-child.js"></script>
</body>
</html>
